<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourism Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('images/back1.png');
            background-size: contain;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* TOP BANNER */

        .main-box {
            background-color: blanchedalmond;
            width: 1090px;
            border-radius: 40px;
            margin: 30px auto;
            height: 300px;
            padding: 10px;
        }

        .main-image {
            background-image: url('images/backmain.png');
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100%;
            border-radius: 20px;
        }

        /* MENU */

        .menu {
            width: 70%;
            margin: auto;
            background: #e8dcc5;
            padding: 14px;
            display: flex;
            justify-content: center;
            gap: 35px;
            border-top: 3px solid #d4b06f;
            border-bottom: 3px solid #d4b06f;
            flex-wrap: wrap;
            border-radius: 9px;
        }

        .menu a {
            text-decoration: none;
            color: #5e0000;
            font-weight: 600;
            font-size: larger;
            transition: 0.3s;
        }

        .menu a:hover {
            color: black;
        }

        /* COUNTRY SECTION */

        .country-container {
            width: 1090px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            overflow: hidden;
            border-radius: 20px;
        }

        .country-card {
            position: relative;
            height: 250px;
            overflow: hidden;
            cursor: pointer;
        }

        .country-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
            display: block;
        }

        /* BLACK OVERLAY */

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        .overlay h2 {
            color: white;
            font-size: 28px;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            transition: 0.5s;
        }

        /* HOVER EFFECT */

        .country-card:hover img {
            transform: scale(1.1);
        }

        .country-card:hover .overlay {
            background: rgba(0, 0, 0, 0.5);
        }

        .country-card:hover .overlay h2 {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
