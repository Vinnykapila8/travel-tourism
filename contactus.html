<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Us</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #f5e6ca, #e0c097);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background-color: #fff8e7;
      border-radius: 15px;
    box-shadow: 
  inset 0 0 10px rgba(0, 0, 0, 0.4),  /* inside shadow */
  0 0 15px rgba(0, 0, 0, 0.6);        /* outside shadow */

      display: flex;
      overflow: hidden;
      width: 800px;
      border:4px solid #5a3e2b;
    }
    .image-section {
      flex: 1;
      background: url('images/phone.png') center/contain no-repeat;
      background-color: #f5e6ca;
    }
    .form-section {
      flex: 1;
      padding: 40px;
    }
    h2 {
      text-align: center;
      color: #5a3e2b;
      font-size: xx-large;
    }
    input, textarea, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background-color: #5a3e2b;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow:0 0 20px rgba(0, 0, 0, 0.6);        /* outside shadow */

    }
    button:hover {
      background-color: #7b563d;
    }
    @media (max-width: 768px) {
  .container {
    flex-direction: column;
    width: 95%;
  }
  .image-section {
    height: 200px;
  }
}
header {
  width: 100%;
  background-color: #5a3e2b;
  padding: 15px 0;
  position: fixed; /* stays at the top */
  top: 0;
  left: 0;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

nav ul {
  list-style: none;
  display: flex;
  justify-content: center;
  margin: 0;
  padding: 0;
}

nav ul li {
  margin: 0 20px;
}

nav ul li a {
  text-decoration: none;
  color: white;
  font-size: 18px;
  font-weight: bold;
  transition: 0.3s;
}

nav ul li a:hover {
  color: #ffb347;
}

  </style>
</head>
<header>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="d.html">Destination</a></li>
      <li><a href="1.html">Travel Guide</a></li>
      <li><a href="gallery.html">Gallery</a></li>
      <li><a href="book.html">Booking</a></li>
      <li><a href="contactus.html">Contact</a></li>
    </ul>
  </nav>
</header>

<body>

  <div class="container">
    <div class="image-section"></div>
    <div class="form-section">
      <h2>Contact Us</h2>
      <form>
        <input type="text" name="username" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="tel" placeholder="Your Phone" required>
        <textarea placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </div>
  </div>


</body>
</html>
