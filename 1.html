<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Tourism Showcase</title>
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
     
      background-image: url(image/Luxurytravelvibew.png);
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: Arial, sans-serif;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .hanger {
      position: absolute;
      top: -200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: dropDown 2s ease forwards, floatBox 3s ease-in-out infinite;
      opacity: 0;
    }

    .h1 {
      left: 10%;
      animation-delay: 0s, 2s;
    }

    .h2 {
      left: 20%;
      animation-delay: 0.3s, 2.3s;
    }

    .h3 {
      left: 30%;
      animation-delay: 0.6s, 2.6s;
    }

    .h4 {
      left: 40%;
      animation-delay: 0.9s, 2.9s;
    }

    .h5 {
      left: 50%;
      animation-delay: 1.2s, 3.2s;
    }

    .h6 {
      left: 60%;
      animation-delay: 1.5s, 3.5s;
    }

    .h7 {
      left: 70%;
      animation-delay: 1.8s, 3.8s;
    }

    .h8 {
      left: 80%;
      animation-delay: 2.1s, 4.1s;
    }

    .h9 {
      left: 90%;
      animation-delay: 2.4s, 4.4s;
    }


    .line {
      width: 4px;
      background: #ffb22c;
    }

    .line1 {
      height: 390px;
    }

    .line2 {
      height: 340px;
    }

    .line3 {
      height: 300px;
    }

    .line4 {
      height: 260px;
    }

    .line5 {
      height: 220px;
    }

    .line6 {
      height: 260px;
    }

    .line7 {
      height: 300px;
    }

    .line8 {
      height: 340px;
    }

    .line9 {
      height: 390px;
    }

    .box {
      width: 99px;
      height: 55px;
      border-radius: 12px;
      border: 2px solid goldenrod;
      margin-top: -2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: medium;
      font-weight: 700;
      animation: glow 2s infinite alternate;
    }

    .b1 {
      background: #f7f7f7;
    }

    .b2 {
      background: #ffb22c;
    }

    .b3 {
      background: #f7f7f7;
    }

    .b4 {
      background:#ffb22c;
    }

    .b5 {
      background: #f7f7f7;
    }

    .b6 {
      background:#ffb22c;
    }

    .b7 {
      background: #f7f7f7;
    }

    .b8 {
      background: #ffb22c;
    }

    .b9 {
      background: #f7f7f7;
    }

    @keyframes dropDown {
      0% {
        transform: translateY(-250px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes floatBox {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(150px);
      }

      100% {
        transform: translateY(0);
      }
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      to {
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
      }
    }
 h1 {
  font-size: 50px;
   position: absolute;
     width: 100%;
  bottom: 150px;
  text-align: center;
  color: #ffb347;
  text-shadow: 0 0 15px #ffb347, 0 0 30px #ff7e5f;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from {
    text-shadow: 0 0 10px #ffb347, 0 0 20px #ff7e5f;
  }
  to {
    text-shadow: 0 0 20px #ffb347, 0 0 40px #ff7e5f;
  }
}

h1 span {
  color: white;
}

    #name {
      margin-top: 350px;
      margin-left: 702px;
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 18px;
      cursor: pointer;
      border: 2px solid #f3c623;
    }

    .button {
      margin-left: 758px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      background-color:#ffb22c;
  box-shadow: 0px 0px 20px #ffb22c;
      border: 2px solid black;
    }

    #images {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }

    .row.reverse {
      flex-direction: row-reverse;
    }

    .card {
      position: relative;
      flex: 1;
      height: 180px;
      overflow: hidden;
      border: 2px solid white;
      opacity: 0;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.2);
    }

    .description {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 14px;
      padding: 5px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover .description {
      opacity: 1;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    @keyframes fadeInLeftSlow {
  from {opacity:0; transform: translateX(-100px);}
  to {opacity:1; transform: translateX(0);}
}
@keyframes fadeInRightSlow {
  from {opacity:0; transform: translateX(100px);}
  to {opacity:1; transform: translateX(0);}
}

.nav-btn {
  position: fixed;
  top: 20px;
  padding: 12px 20px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  background-color: #ffb22c;
  border: 2px solid black;
  box-shadow: 0px 0px 15px #ffb22c;
}

.nav-btn.back {
  left:20px;   /* bottom-left corner */
}

.nav-btn.front {
  right: 20px;  /* bottom-right corner */
}
.back-btn {
  text-decoration: none;
  color: inherit;   /* inherit button text color */
  display: flex;
  align-items: center;
  font-size: xx-large;
  font-weight: 500;
  gap: 5px;         /* space between icon and text */
}


  </style>
</head>

<body>
  <div class="scene">
 <h1>Explore The <span>Beautiful World</span></h1>
    <div class="hanger h1">
      <div class="line line1"></div>
      <div class="box b1">FRANCE</div>
    </div>
    <div class="hanger h2">
      <div class="line line2"></div>
      <div class="box b2">SPAIN</div>
    </div>
    <div class="hanger h3">
      <div class="line line3"></div>
      <div class="box b3">USA</div>
    </div>
    <div class="hanger h4">
      <div class="line line4"></div>
      <div class="box b4">TURKEY</div>
    </div>
    <div class="hanger h5">
      <div class="line line5"></div>
      <div class="box b5">ITALY</div>
    </div>
    <div class="hanger h6">
      <div class="line line6"></div>
      <div class="box b6">MEXICO</div>
    </div>
    <div class="hanger h7">
      <div class="line line7"></div>
      <div class="box b7">GERMANY</div>
    </div>
    <div class="hanger h8">
      <div class="line line8"></div>
      <div class="box b8">JAPAN</div>
    </div>
    <div class="hanger h9">
      <div class="line line9"></div>
      <div class="box b9">GREECE</div>
    </div>

    <form id="countryForm">
      <input type="text" placeholder="Type country name" id="name"><br><br>
      <button type="submit" class="button">Click Me</button>
    </form>
    <div id="images"></div>
  </div>


<button id="goFront" class="nav-btn front"><a href="gallery.html" class="back-btn"><i class="bi bi-arrow-90deg-right"></i></a></button>
<button id="goBack" class="nav-btn back">
  <a href="d.html" class="back-btn">
    <i class="bi bi-arrow-90deg-left"></i> 
  </a>
</button>



  <script>
const countryPages = {
  "FRANCE": "france.html",
  "SPAIN": "spain.html",
  "USA": "usa.html",
  "TURKEY": "turkey.html",
  "ITALY": "italy.html",
  "MEXICO": "mexico.html",
  "GERMANY": "germany.html",
  "JAPAN": "japan.html",
  "GREECE": "greece.html"
};
document.getElementById("countryForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const input = document.getElementById("name").value.trim().toUpperCase();

  if (countryPages[input]) {
    // Redirect to the corresponding HTML page
    window.location.href = countryPages[input];
  } else {
    alert("Country not found. Try again.");
  }
});


</script>
</body>
</html>
